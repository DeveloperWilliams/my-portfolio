<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Achuchi - Software Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #33ff33;
            --secondary: #ff33cc;
            --accent: #3399ff;
            --background: #000;
            --terminal-bg: #111;
            --header-bg: #222;
            --text: #33ff33;
            --prompt: #ff33cc;
            --cursor: #33ff33;
            --selection: rgba(51, 255, 51, 0.3);
        }
        
        body {
            background-color: var(--background);
            color: var(--text);
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            line-height: 1.6;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(51, 255, 51, 0.05) 2%, transparent 20%),
                radial-gradient(circle at 75% 75%, rgba(255, 51, 204, 0.05) 2%, transparent 20%);
            background-size: 30px 30px;
        }
        
        /* Terminal styling */
        .terminal {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(51, 255, 51, 0.2);
            display: flex;
            flex-direction: column;
        }
        
        .terminal-header {
            background-color: var(--header-bg);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary);
            user-select: none;
        }
        
        .window-controls {
            display: flex;
            gap: 8px;
        }
        
        .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .close { background-color: #ff5f56; }
        .minimize { background-color: #ffbd2e; }
        .maximize { background-color: #27c93f; }
        
        .terminal-title {
            flex-grow: 1;
            text-align: center;
            font-weight: bold;
        }
        
        .terminal-body {
            background-color: var(--terminal-bg);
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
        }
        
        .terminal-content {
            height: 100%;
        }
        
        /* Text effects */
        .command {
            color: var(--text);
            margin-bottom: 10px;
            display: flex;
        }
        
        .prompt {
            color: var(--prompt);
            margin-right: 10px;
            white-space: nowrap;
        }
        
        .cursor {
            display: inline-block;
            background-color: var(--cursor);
            width: 8px;
            height: 1em;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Link styling */
        a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
        }
        
        a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }
        
        a::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--secondary);
            transition: width 0.3s;
        }
        
        a:hover::after {
            width: 100%;
        }
        
        /* Content sections */
        .section {
            margin-bottom: 25px;
        }
        
        .section-title {
            color: #ffcc00;
            margin-bottom: 10px;
            border-bottom: 1px dashed var(--primary);
            padding-bottom: 5px;
        }
        
        .skills-list {
            list-style-type: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .skills-list li {
            background-color: rgba(51, 255, 51, 0.1);
            padding: 5px 10px;
            border-radius: 3px;
            border: 1px solid rgba(51, 255, 51, 0.3);
            transition: all 0.3s;
        }
        
        .skills-list li:hover {
            background-color: rgba(51, 255, 51, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        /* Input styling */
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        
        #command-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: inherit;
            padding: 5px;
            flex-grow: 1;
            outline: none;
            caret-color: var(--cursor);
        }
        
        /* Scrollbar styling */
        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }
        
        .terminal-body::-webkit-scrollbar-track {
            background: rgba(51, 255, 51, 0.1);
            border-radius: 4px;
        }
        
        .terminal-body::-webkit-scrollbar-thumb {
            background: rgba(51, 255, 51, 0.3);
            border-radius: 4px;
        }
        
        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(51, 255, 51, 0.5);
        }
        
        /* Command output styling */
        .command-output {
            margin-bottom: 15px;
        }
        
        /* ASCII Art */
        .ascii-art {
            color: var(--accent);
            font-family: 'Courier New', monospace;
            line-height: 1.2;
            margin-bottom: 20px;
            white-space: pre;
            font-size: 12px;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .terminal-body {
                padding: 15px;
            }
            
            .skills-list {
                flex-direction: column;
                gap: 5px;
            }
            
            .ascii-art {
                font-size: 8px;
            }
        }
        
        /* Animation for initial loading */
        @keyframes glow {
            0% { text-shadow: 0 0 5px var(--primary); }
            50% { text-shadow: 0 0 20px var(--primary), 0 0 30px var(--primary); }
            100% { text-shadow: 0 0 5px var(--primary); }
        }
        
        .glowing-text {
            animation: glow 2s infinite;
        }
        
        /* Selection styling */
        ::selection {
            background-color: var(--selection);
        }
    </style>
</head>

            `;
            
            // All content to be displayed with typewriter effect
            const commands = [
                {text: asciiArt, delay: 0, isASCII: true},
                {text: "Welcome to William Achuchi's interactive terminal portfolio", delay: 40},
                {text: "Initializing system...", delay: 100},
                {text: "Loading personal profile...", delay: 100},
                {text: "System ready! Type 'help' to see available commands", delay: 100},

                {text: " ", delay: 100},
                {text: "social", delay: 500, isCommand: true},
                {text: "Twitter:    <a href='https://x.com/dev_williee' target='_blank'>https://x.com/dev_williee</a>", delay: 20},
                {text: "LinkedIn:   <a href='https://www.linkedin.com/in/achuchi/' target='_blank'>https://www.linkedin.com/in/achuchi/</a>", delay: 20},

            // Function to type out text with a delay
            function typeWriter() {
                if (commandIndex < commands.length) {
                    const command = commands[commandIndex];
                    
                    if (command.isCommand) {
                        const promptElem = document.createElement('div');
                        promptElem.className = 'command';
                        promptElem.innerHTML = `<span class="prompt">visitor@portfolio:~$</span> ${command.text}`;

                    } else if (command.isASCII) {
                        const asciiElem = document.createElement('div');
                        asciiElem.className = 'ascii-art';
                        asciiElem.textContent = command.text;
                        terminalContent.appendChild(asciiElem);
                    } else if (command.isFinal) {
                        // After the initial animation, setup interactive mode
                        setTimeout(initInteractiveMode, command.delay);
                    } else {
                        const textElem = document.createElement('div');
                        textElem.innerHTML = command.text;
                        terminalContent.appendChild(textElem);
                    }
                    
                    // Scroll to bottom
                    terminalContent.scrollTop = terminalContent.scrollHeight;
                    
                    commandIndex++;
                    setTimeout(typeWriter, command.delay);
                }
            }
            
            // Initialize interactive mode
            function initInteractiveMode() {
                isInputMode = true;
                
                // Create input line
                const inputLine = document.createElement('div');
                inputLine.className = 'input-line';
                inputLine.innerHTML = `
                    <span class="prompt">visitor@portfolio:~$</span>
                    <input type="text" id="command-input" autofocus>
                `;
                terminalContent.appendChild(inputLine);
                
                const commandInput = document.getElementById('command-input');
                
                // Focus on input
                commandInput.focus();
                
                // Handle command submission
                commandInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        const command = this.value.trim().toLowerCase();
                        this.value = '';
                        
                        // Add the command to output
                        const commandElem = document.createElement('div');
                        commandElem.className = 'command';
                        commandElem.innerHTML = `<span class="prompt">visitor@portfolio:~$</span> ${command}`;
                        terminalContent.appendChild(commandElem);
                        
                        // Process command
                        if (availableCommands[command]) {
                            if (availableCommands[command].isClear) {
                                // Clear terminal
                                terminalContent.innerHTML = '';
                            } else {
                                // Add command output
                                const outputElem = document.createElement('div');
                                outputElem.innerHTML = availableCommands[command].output;
                                terminalContent.appendChild(outputElem);
                            }
                        } else if (command) {
                            // Command not found
                            const errorElem = document.createElement('div');
                            errorElem.className = 'command-output';
                            errorElem.innerHTML = `Command not found: ${command}. Type 'help' to see available commands.`;
                            terminalContent.appendChild(errorElem);
                        }
                        
                        // Add new input line
                        const newInputLine = document.createElement('div');
                        newInputLine.className = 'input-line';
                        newInputLine.innerHTML = `
                            <span class="prompt">visitor@portfolio:~$</span>
                            <input type="text" id="command-input" autofocus>
                        `;
                        terminalContent.appendChild(newInputLine);
                        
                        // Remove old input and focus on new one
                        inputLine.remove();
                        const newCommandInput = document.getElementById('command-input');
                        newCommandInput.focus();
                        
                        // Add event listener to new input
                        newCommandInput.addEventListener('keydown', arguments.callee);
                        
                        // Scroll to bottom
                        terminalContent.scrollTop = terminalContent.scrollHeight;
                    }
                });
            }
            
            // Start the typewriter effect
            typeWriter();
            
            // Add click to focus functionality
            document.addEventListener('click', function() {
                if (isInputMode) {
                    const input = document.getElementById('command-input');
                    if (input) input.focus();
                }
            });
        });
